<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>ZenEngine Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="stylesheet" href="./styles/editor.css" />
<script>
// Early error buffer: collect errors BEFORE main.js loads so they can
// be flushed into the editor's ConsoleCapture once it's ready.
window.__zengineEarlyErrors = [];
window.__zengineEarlyLogs = function(level, msg) {
  window.__zengineEarlyErrors.push({ level: level, msg: msg, time: Date.now() });
};

// Auto-recovery: if a JS module fails to load (e.g. "Failed to fetch
// dynamically imported module" from a missing/stale file, or
// "Unexpected end of input" from a truncated cached file), automatically
// reload once with cache-busting. If the retry also fails, show a small
// error banner — NOT a full-screen overlay — with a Reload button.
(function () {
  var p = new URLSearchParams(location.search);
  var recovered = p.get("recovered") === "1";
  function reload() {
    p.set("recovered", "1");
    p.set("t", Date.now().toString());
    location.replace(location.pathname + "?" + p.toString());
  }
  function showFallback() {
    var el = document.getElementById("app") || document.body;
    el.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;background:#1a1a2e;color:#fff;font-family:system-ui;text-align:center;padding:20px;">' +
      '<h2 style="margin:0 0 8px;font-size:18px;">Editor failed to load</h2>' +
      '<p style="margin:0 0 16px;color:#999;font-size:13px;max-width:340px;">A JavaScript module failed to load — this is usually a stale cache issue. Click Reload to force-refresh all engine files.</p>' +
      '<button onclick="location.replace(location.pathname)" style="padding:8px 24px;background:#6366f1;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:13px;">Reload</button>' +
      "</div>";
  }
  function handleError(msg) {
    if (!msg) return;
    // These errors mean a module file couldn't be fetched or parsed —
    // try one cache-busting reload. On the second failure, show fallback.
    var isModuleError =
      msg.indexOf("Failed to fetch dynamically imported module") !== -1 ||
      msg.indexOf("error resolving module") !== -1 ||
      msg.indexOf("Unexpected end of input") !== -1 ||
      msg.indexOf("SyntaxError") !== -1;
    if (isModuleError) {
      if (!recovered) reload();
      else showFallback();
    }
  }
  window.addEventListener("error", function (e) {
    handleError((e.error && e.error.message) || e.message || "");
  });
  window.addEventListener("unhandledrejection", function (e) {
    handleError((e.reason && (e.reason.message || e.reason.toString())) || "");
  });
  // Safety net: if #app is still empty after 10s, a module likely failed
  // silently — try one cache-busting reload.
  setTimeout(function () {
    var app = document.getElementById("app");
    if (app && app.children.length === 0) {
      if (!recovered) reload();
      else showFallback();
    }
  }, 10000);
})();
</script>
</head>
<body>
  <div id="app"></div>
  <script>
  // Error handler: route all errors to console.error (so the editor's
  // ConsoleCapture picks them up and shows them in the engine console
  // panel) instead of showing a full-screen overlay. A small toast at
  // the bottom provides a visible signal without blocking the editor.
  window.addEventListener("error", function(e) {
    var msg = (e.error && e.error.message) || e.message || "";
    // Suppress the known PIXI ResizeObserver race during innerHTML
    // rebuilds — the retry in main.js handles it.
    if (msg.indexOf("no longer a child") !== -1 || msg.indexOf("node to be removed") !== -1) {
      e.preventDefault();
      return;
    }
    var text = "ERROR: " + ((e.error && e.error.stack) || e.message || JSON.stringify(e));
    console.error(text);
    window.__zengineEarlyLogs("error", text);
    // Show a small non-blocking toast

  });
  window.addEventListener("unhandledrejection", function(e) {
    var msg = (e.reason && (e.reason.message || e.reason.toString())) || "";
    if (msg.indexOf("no longer a child") !== -1 || msg.indexOf("node to be removed") !== -1) {
      e.preventDefault();
      return;
    }
    var text = "REJECTION: " + ((e.reason && (e.reason.stack || e.reason.message || e.reason.toString())) || JSON.stringify(e.reason));
    console.error(text);
    window.__zengineEarlyLogs("error", text);

  });
  // Check if PIXI loaded — log to console, don't block the screen
  setTimeout(function() {
    if (typeof PIXI === "undefined") {
      var msg = "PIXI is undefined - CDN script failed to load";
      console.error(msg);
      window.__zengineEarlyLogs("error", msg);

    }
  }, 3000);
  </script>
  <script type="module">
    // Cache-bust: always fetch the latest main.js (never a stale cached
    // copy) by appending a per-load timestamp. The no-cache meta tags
    // above force the browser to revalidate every transitive ES module
    // import too, so published updates are always visible without a
    // manual hard-refresh.
    import("./main.js?t=" + Date.now()).catch(function(err) {
      // If main.js itself fails to load, log it — the auto-recovery
      // handler above will trigger a cache-busting reload.
      console.error("Failed to load editor main.js:", err);
      window.__zengineEarlyLogs("error", "Failed to load editor main.js: " + (err && err.message ? err.message : err));
    });
  </script>
</body>
</html>
